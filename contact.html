<head>

    <title>Contact - Minh Tran</title>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; line-height: 1.6; color: #222; background-color: #f7f9fc; }
        header { background-color: #1f2937; color: white; padding: 40px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 42px; }
        nav { background-color: #111827; padding: 12px; text-align: center; }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            padding: 8px 16px;
            border-radius: 999px;
        }
        .container { max-width: 900px; margin: 32px auto; padding: 24px; }
        .container h2 {
            text-align: center;
            margin: 0 0 12px 0;
            font-size: 32px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #111827;
            position: relative;
            font-weight: 900;
        }
        .container h2::after {
            content: '';
            display: block;
            width: 84px;
            height: 4px;
            margin: 12px auto 0;
            border-radius: 999px;
            background: linear-gradient(90deg, #111827, #0b5ed7);
        }
        .contact-list {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }
        .contact-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid rgba(17, 24, 39, 0.08);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
        }
        .contact-icon {
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #111827;
            color: white;
        }
        .contact-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .contact-text { display: flex; flex-direction: column; gap: 2px; }
        .contact-label { font-size: 14px; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
        .contact-text a { color: #0b5ed7; text-decoration: none; font-weight: 700; word-break: break-word; }
        .contact-text a:hover { text-decoration: underline; }
    </style>
